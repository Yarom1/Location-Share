name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /opt/gradle-8.3
          key: gradle-8.3-${{ hashFiles('**/*.gradle') }}
          restore-keys: gradle-8.3-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/build-tools
          key: android-build-tools-33

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release-key.jks

      - name: Copy web assets
        run: |
          mkdir -p app/src/main/assets
          cp web/index.html app/src/main/assets/index.html

      - name: Generate launcher icons
        run: |
          sudo apt-get install -y imagemagick
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p app/src/main/res/$dir
            size=48
            [ "$dir" = "mipmap-hdpi" ] && size=72
            [ "$dir" = "mipmap-xhdpi" ] && size=96
            [ "$dir" = "mipmap-xxhdpi" ] && size=144
            [ "$dir" = "mipmap-xxxhdpi" ] && size=192
            convert -size ${size}x${size} xc:#00d4aa \
              -fill white -gravity center \
              -font DejaVu-Sans -pointsize $((size/2)) \
              -annotate 0 "LS" \
              app/src/main/res/$dir/ic_launcher.png
            cp app/src/main/res/$dir/ic_launcher.png \
               app/src/main/res/$dir/ic_launcher_round.png
          done

      - name: Install Gradle 8.3
        run: |
          if [ ! -f /opt/gradle-8.3/bin/gradle ]; then
            wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt
          fi
          echo "/opt/gradle-8.3/bin" >> $GITHUB_PATH

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocationShare-APK
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
