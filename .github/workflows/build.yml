name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Copy web assets
        run: |
          mkdir -p app/src/main/assets
          cp web/index.html app/src/main/assets/index.html

      - name: Install Gradle 8.3
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.3/bin" >> $GITHUB_PATH

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocationShare-APK
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
