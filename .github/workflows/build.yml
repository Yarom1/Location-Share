name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release-key.jks

      - name: Copy web assets
        run: |
          mkdir -p app/src/main/assets
          cp web/index.html app/src/main/assets/index.html

      - name: Generate launcher icons
        run: |
          sudo apt-get install -y imagemagick
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p app/src/main/res/$dir
            size=48
            [ "$dir" = "mipmap-hdpi" ] && size=72
            [ "$dir" = "mipmap-xhdpi" ] && size=96
            [ "$dir" = "mipmap-xxhdpi" ] && size=144
            [ "$dir" = "mipmap-xxxhdpi" ] && size=192
            convert -size ${size}x${size} xc:#00d4aa \
              -fill white -gravity center \
              -font DejaVu-Sans -pointsize $((size/2)) \
              -annotate 0 "LS" \
              app/src/main/res/$dir/ic_launcher.png
            cp app/src/main/res/$dir/ic_launcher.png \
               app/src/main/res/$dir/ic_launcher_round.png
          done

      - name: Install Gradle 8.3
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.3/bin" >> $GITHUB_PATH

      - name: Write signing config
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > app/build.gradle << GRADLE
plugins {
    id 'com.android.application'
    id 'kotlin-android'
}
android {
    compileSdk 34
    namespace "com.locationshare"
    defaultConfig {
        applicationId "com.locationshare"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        release {
            storeFile file("../../release-key.jks")
            storePassword "${STORE_PASSWORD}"
            keyAlias "${KEY_ALIAS}"
            keyPassword "${KEY_PASSWORD}"
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions { jvmTarget = '1.8' }
    sourceSets { main { assets { srcDirs = ['src/main/assets'] } } }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
}
GRADLE

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocationShare-APK
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
